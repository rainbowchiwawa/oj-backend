services:
  db:
    image: postgres
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_SCHEMA}
    volumes:
      - db_data:/var/lib/postgresql
    expose:
      - 5432
    ports:
      - ${DB_PORT}:5432
    networks:
      - bridge
  server:
    build: ./server
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    expose:
      - 8080
    ports:
      - 8080:8080
    networks:
      - bridge
networks:
  bridge:
volumes:
  db_data: